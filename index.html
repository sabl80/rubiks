<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rubiks Kube 3D</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div>
      <h1>Rubiks Kube Spill (3D)</h1>
      <p class="sub">Dra med musen for å rotere. Bruk knappene for trekk.</p>
    </div>

    <div class="status">
      <div><span class="label">Tid:</span> <span id="time">00:00</span></div>
      <div><span class="label">Trekk:</span> <span id="moves">0</span></div>
      <div id="solved" class="badge">Ikke løst</div>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <h2>Kontroller</h2>

      <div class="grid">
        <button data-move="U">U</button>
        <button data-move="U'">U'</button>

        <button data-move="D">D</button>
        <button data-move="D'">D'</button>

        <button data-move="L">L</button>
        <button data-move="L'">L'</button>

        <button data-move="R">R</button>
        <button data-move="R'">R'</button>

        <button data-move="F">F</button>
        <button data-move="F'">F'</button>

        <button data-move="B">B</button>
        <button data-move="B'">B'</button>
      </div>

      <div class="row">
        <button id="scramble" class="primary">🎲 Scramble</button>
        <button id="reset">🔄 Reset</button>
        <button id="check">✅ Sjekk</button>
      </div>

      <p class="hintSmall">Tips: Tastatur U/D/L/R/F/B. Hold <b>Shift</b> for motsatt (U').</p>
    </section>

    <section class="view3d">
      <div id="view"></div>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
